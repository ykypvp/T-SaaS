<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .tab-content { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .inline-code { 
            background: #1e293b; 
            color: #10b981; 
            padding: 0.2rem 0.5rem; 
            border-radius: 0.5rem; 
            font-family: monospace; 
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .inline-code:hover { background: #0f172a; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 h-screen flex overflow-hidden">

    <aside class="w-72 glass border-r border-slate-200/60 flex flex-col p-6 z-20">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-9 h-9 bg-emerald-500 rounded-xl shadow-lg shadow-emerald-200 flex items-center justify-center">
                <i data-lucide="layers" class="text-white w-5 h-5"></i>
            </div>
            <span class="font-bold text-xl tracking-tight uppercase text-slate-800">T-<span class="text-emerald-500 underline decoration-2 underline-offset-4">SaaS</span></span>
        </div>

        <nav id="menu" class="space-y-2 flex-1 overflow-y-auto">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-4 mb-2">Main Menu</p>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-hidden">
        <header class="h-20 flex items-center justify-between px-10 glass border-b border-slate-100">
            <h2 id="current-tab-title" class="text-2xl font-bold tracking-tight text-slate-800">Loading...</h2>
            <div class="flex gap-3">
                <div class="h-10 w-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-400"><i data-lucide="user" class="w-5 h-5"></i></div>
            </div>
        </header>

        <div id="content-area" class="p-10 max-w-5xl mx-auto w-full overflow-y-auto h-full">
            <div class="flex flex-col items-center justify-center h-full text-center space-y-4">
                <i data-lucide="refresh-cw" class="w-16 h-16 text-emerald-200 animate-spin"></i>
                <p class="text-slate-400">Reading configuration file...</p>
            </div>
        </div>
    </main>

    <script>
        const menu = document.getElementById('menu');
        const contentArea = document.getElementById('content-area');
        const tabTitle = document.getElementById('current-tab-title');

        const ACTIONS = {
            helloWorld: () => alert("Hello!!!"),
            sysRestart: () => location.reload(),
            clearConsole: () => { console.clear(); }
        };

        window.copyToClipboard = (text) => {
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard: " + text);
        };

        window.addEventListener('DOMContentLoaded', () => {
            fetch('config.md')
                .then(response => {
                    if (!response.ok) throw new Error('Config missing');
                    return response.text();
                })
                .then(content => processMD(content))
                .catch(err => {
                    tabTitle.innerText = "Error";
                    contentArea.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-center space-y-4"><i data-lucide="alert-circle" class="w-16 h-16 text-red-400"></i><p class="text-slate-500 text-lg"><strong>config.md</strong> not found.</p></div>`;
                    lucide.createIcons();
                });
        });

        function parseText(text) {
            return text.replace(/`(.*?)`/g, '<span class="inline-code" onclick="copyToClipboard(\'$1\')">$1</span>');
        }

        function processMD(text) {
            menu.innerHTML = '<p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-4 mb-2">Main Menu</p>';
            const lines = text.split('\n');
            let tabs = [];
            let currentTab = null;
            let currentBlock = null;

            lines.forEach(line => {
                const trimmed = line.trim();
                if (line.startsWith('# ')) {
                    if (currentTab) tabs.push(currentTab);
                    currentTab = { name: line.replace('# ', '').trim(), blocks: [] };
                    currentBlock = null;
                } else if (line.startsWith('## ')) {
                    currentBlock = { title: line.replace('## ', '').trim(), text: '', buttons: [] };
                    if (currentTab) currentTab.blocks.push(currentBlock);
                } else if (line.startsWith('\t') || line.startsWith('    ') || line.startsWith('  ')) {
                    if (!currentBlock) return;
                    if (trimmed.startsWith('"')) {
                        currentBlock.text = trimmed.replace(/"/g, '');
                    } else if (trimmed.includes('[')) {
                        const matches = trimmed.match(/\["(.*?)"\]/g);
                        if (matches) {
                            currentBlock.buttons = matches.map(m => {
                                const content = m.replace(/[\["\]]/g, '');
                                const [label, func] = content.split(':');
                                return { label: label.trim(), func: func ? func.trim() : null };
                            });
                        }
                    }
                }
            });
            if (currentTab) tabs.push(currentTab);

            tabs.forEach((tab, index) => {
                const btn = document.createElement('button');
                btn.className = `w-full flex items-center justify-between px-4 py-3.5 rounded-2xl font-medium transition-all duration-300 group hover:bg-white hover:shadow-md text-slate-500 hover:text-emerald-600 border border-transparent hover:border-emerald-100`;
                btn.innerHTML = `<span>${tab.name}</span> <i data-lucide="chevron-right" class="w-4 h-4 opacity-0 group-hover:opacity-100 -translate-x-2 group-hover:translate-x-0 transition-all"></i>`;
                btn.onclick = () => { setActive(btn); renderContent(tab); };
                menu.appendChild(btn);
                if (index === 0) btn.click();
            });
            lucide.createIcons();
        }

        function setActive(btn) {
            document.querySelectorAll('#menu button').forEach(b => b.classList.remove('bg-white', 'shadow-md', 'text-emerald-600', 'border-emerald-100'));
            btn.classList.add('bg-white', 'shadow-md', 'text-emerald-600', 'border-emerald-100');
        }

        function runAction(funcName) {
            if (funcName && ACTIONS[funcName]) ACTIONS[funcName]();
        }

        function renderContent(tab) {
            tabTitle.innerText = tab.name;
            contentArea.innerHTML = `
                <div class="tab-content flex flex-col gap-6">
                    ${tab.blocks.map(block => `
                        <div class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100 relative overflow-hidden">
                            <div class="absolute top-0 right-0 p-8 opacity-5"><i data-lucide="cpu" class="w-32 h-32 text-emerald-900"></i></div>
                            <h3 class="text-sm font-bold text-emerald-500 uppercase tracking-[0.2em] mb-4">${block.title}</h3>
                            <p class="text-slate-600 text-xl font-light leading-relaxed mb-10 max-w-2xl">${parseText(block.text)}</p>
                            <div class="flex flex-wrap gap-4">
                                ${block.buttons.map(b => `
                                    <button onclick="runAction('${b.func || ''}')" class="group relative px-8 py-4 bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl font-bold shadow-xl shadow-emerald-100 transition-all hover:-translate-y-1 active:scale-95 overflow-hidden">
                                        <span class="relative z-10">${b.label}</span>
                                        <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            lucide.createIcons();
        }
    </script>
</body>
</html>
